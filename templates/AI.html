
{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm rounded-4">

        <!-- HEADER -->
        <div class="card-header bg-white border-0 d-flex align-items-center">
            <h5 class="mb-0">🤖 AI Асистент</h5>
        </div>

        <!-- CHAT -->
        <div id="messages" style="height: 400px; overflow-y: auto; padding: 20px; background: #f8f9fa;">
            <div class="bg-white p-2 rounded mb-2">
                Привіт! 👋 Я допоможу спланувати подорож ✈️
            </div>
        </div>

        <!-- INPUT -->
        <div class="card-footer bg-white d-flex gap-2">
            <input id="input" class="form-control" placeholder="Запитай про подорож...">
            <button class="btn btn-success" onclick="send()">Надіслати</button>
        </div>

    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

function addMessage(text, type) {
    // 1. Шукаємо контейнер (спробуємо різні варіанти назв)
    const chatContainer = document.getElementById("chat-messages") ||
                          document.getElementById("messages") ||
                          document.querySelector(".messages-container");

    if (!chatContainer) {
        console.error("Помилка: Не знайдено блок для чату в HTML!");
        return;
    }

    // 2. Створюємо елемент повідомлення
    const messageElement = document.createElement("div");
    messageElement.classList.add("message", type);

    // Стилі для того, щоб повідомлення було видно (якщо CSS підкачав)
    messageElement.style.marginBottom = "10px";
    messageElement.style.padding = "10px";
    messageElement.style.borderRadius = "8px";
    messageElement.style.backgroundColor = type === "user" ? "#e1f5fe" : "#f1f1f1";

    // 3. Додаємо контент
    if (type === "bot" && typeof marked !== "undefined") {
        try {
            messageElement.innerHTML = marked.parse(text);
        } catch (e) {
            messageElement.innerText = text; // якщо marked зламався
        }
    } else {
        messageElement.innerText = text;
    }

    // 4. Додаємо в контейнер
    chatContainer.appendChild(messageElement);

    // 5. Прокрутка
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// Твоя функція send, вона має бути такою:
async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
        const res = await fetch("/api/ai", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });

        const data = await res.json();

        if (data.reply) {
            addMessage(data.reply, "bot");
        } else {
            throw new Error("Немає відповіді від сервера");
        }

    } catch (err) {
        addMessage("⚠️ Помилка: " + err.message, "bot");
        console.error(err);
    }
}
</script>

{% endblock %}
